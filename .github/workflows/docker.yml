name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: frontend
            context: ./frontend
          - service: contracts
            context: ./contracts

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ahamednazeer/blockchain-based-agricultural-marketplace
          tags: |
            type=raw,value=${{ matrix.service }}-latest,enable={{is_default_branch}}
            type=sha,prefix=${{ matrix.service }}-
            type=ref,event=tag,prefix=${{ matrix.service }}-

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
